<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Network Store - Login</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex flex-col md:flex-row min-h-screen items-center justify-center p-6 gap-12 font-sans">

    <!-- Login Card -->
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-gray-200">
        <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center">Member Login</h2>
        <p class="text-xs text-gray-400 text-center mb-6">Enter credentials to view your Tree</p>
        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Login ID</label>
                <input type="text" name="login_id" placeholder="swapnil-sanjay-khude-345" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Password</label>
                <input type="password" name="password" placeholder="••••••••" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-semibold hover:bg-indigo-700 transition shadow-md">Sign In</button>
        </form>
    </div>

    <!-- Binary Registration Card -->
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-200">
        <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center">Binary Registration</h2>
        <p class="text-xs text-gray-400 text-center mb-6">Create Left (A) or Right (B) positions</p>
        <form action="/register" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Full Name</label>
                <input type="text" name="name" placeholder="Enter Full Name" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Address Details</label>
                <input type="text" name="address" placeholder="Complete Address" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Pincode</label>
                    <input type="text" name="pincode" placeholder="411001" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Parent / Sponsor ID</label>
                    <input type="text" name="parent_id" placeholder="swapnil-sanjay-khude-345" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Select Binary Team Position</label>
                <select name="position" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    <option value="Left">Team A (Left Side)</option>
                    <option value="Right">Team B (Right Side)</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-emerald-600 text-white py-2.5 rounded-lg font-semibold hover:bg-emerald-700 transition shadow-md">Register Member</button>
        </form>
    </div>

</body>
</html>
